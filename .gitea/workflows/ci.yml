name: CI

# Runs the test suite on every PR targeting dev or main. Gitea reports each
# job as a commit status, which branch protection requires green before merge
# (see issue #13).
on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    # Disposable Postgres for the integration tests. The setup file reuses this
    # (CI=true) instead of starting a Testcontainers instance, which needs a
    # Docker socket the runner may not expose.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mytradeledger_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/mytradeledger_test?schema=public
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test
      - name: Integration tests
        run: npm run test:integration

  client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck and build
        run: npm run build
      - name: Typecheck tests
        run: npx tsc --noEmit -p tsconfig.test.json
      - name: Unit tests
        run: npm test
